<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Modifier l'absence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card bg-body-tertiary border shadow p-4">
            <h2 class="h4 mb-3 text-success">✏️ Modifier l'absence</h2>
            <p>
                <strong>Étudiant :</strong> {{ absence.etudiant.prenom }} {{ absence.etudiant.nom }}<br>
                <strong>Cours :</strong> {{ absence.cours.titre }} ({{ absence.cours.date_cours|date:"d/m/Y" }})
            </p>
            <hr class="border-secondary">

            <form method="POST">
                {% csrf_token %}

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="justifie" name="justifie" {% if absence.justifie %}checked{% endif %}>
                    <label class="form-check-label fw-bold text-light" for="justifie">L'absence est justifiée</label>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nom du document justificatif (ex: Certificat_Medical.pdf)</label>
                    <input type="text" name="justification" class="form-control text-light bg-dark border-secondary" value="{{ absence.justification }}">
                </div>

                <div class="d-flex gap-2 justify-content-end mt-4">
                    <a href="{% url 'statistiques' %}" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-success">Enregistrer les modifications</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
